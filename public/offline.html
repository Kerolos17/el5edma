<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - نظام الافتقاد</title>
    <meta name="theme-color" content="#0073A3">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f1ee;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: #faf9f7;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #0073a3;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #1a1a2e;
        }
        p {
            color: #4a5568;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background-color: #0073a3;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #0b1120; color: #f1f5f9; }
            .container { background-color: #1e293b; }
            h1 { color: #f1f5f9; }
            p { color: #94a3b8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔌</div>
        <h1>أنت غير متصل بالإنترنت</h1>
        <p>عذراً، يبدو أنك فقدت الاتصال بالإنترنت. يرجى التحقق من الشبكة والمحاولة مرة أخرى.</p>
        <a href="javascript:window.location.reload();" class="btn">إعادة المحاولة</a>
    </div>
</body>
</html>
